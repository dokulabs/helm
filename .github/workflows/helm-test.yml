name: Helm Test

on: pull_request

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.12.1
      
      - name: Add Timescale Chart Repo
        run: helm repo add timescale https://charts.timescale.com/

      - name: Update Chart Dependencies
        run: helm repo update

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          check-latest: true

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.6.0

      # - name: Run chart-testing (list-changed)
      #   id: list-changed
      #   run: |
      #     changed=$(ct list-changed --target-branch ${{ github.event.repository.default_branch }})
      #     if [[ -n "$changed" ]]; then
      #       echo "changed=true" >> "$GITHUB_OUTPUT"
      #     fi

      - name: Run chart-testing (lint)
        # if: steps.list-changed.outputs.changed == 'true'
        run: ct lint --target-branch ${{ github.event.repository.default_branch }}

      - name: Create kind cluster
        # if: steps.list-changed.outputs.changed == 'true'
        uses: helm/kind-action@v1.8.0

      - name: Install Helm Chart in namespace doku-${{ github.run_id }}
        # if: steps.list-changed.outputs.changed == 'true'
        run: helm install ${{ github.ref_name }} ./charts/doku --namespace doku-${{ github.run_id }} --create-namespace

      - name: Wait for Pods to be ready in namespace doku-${{ github.run_id }}
        # if: steps.list-changed.outputs.changed == 'true'
        run: sleep 120
      
      - name: Check Pod status in namespace doku-${{ github.run_id }}
        # if: steps.list-changed.outputs.changed == 'true'
        run: |
          kubectl get pods -n doku-${{ github.run_id }}

      - name: Print logs for a pod with label `app=${{ github.ref_name }}`
        # if: steps.list-changed.outputs.changed == 'true'
        run: |
          kubectl logs -n doku-${{ github.run_id }} -l app=${{ github.ref_name }}
      
      - name: Check if Doku pods are running in namespace "doku-${{ github.run_id }}"
        # if: steps.list-changed.outputs.changed == 'true'
        run: |
          STATUS=$(kubectl get pods -l app=${{ github.ref_name }} -n doku-${{ github.run_id }} -o jsonpath="{.items[*].status.phase}")
          if [ "$STATUS" != "Running" ]; then
            echo "Pod is not in Running state: $STATUS"
            exit 1
          fi
          echo "All pods are in the Running state."